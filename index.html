<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Mapas GeoJSON CDMX</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">
        <aside id="sidebar">
            <div class="sidebar-header">

                <h1>Mapas CDMX</h1>
                <p>Capas Geográficas</p>

                <div class="upload-section">
                    <label for="file-upload" class="upload-btn">
                        <span class="icon">📂</span> Cargar Archivo (.zip)
                    </label>
                    <input type="file" id="file-upload" accept=".zip" style="display: none;">
                </div>
            </div>
            <div id="layers-list" class="layers-container">
                <!-- Layers will be injected here via JS -->

            </div>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span id="status-dot" class="dot"></span>
                    <span id="status-text">Listo</span>
                </div>
            </div>
        </aside>

        <main id="map-container">
            <div id="map"></div>
            <div id="map-overlay" class="hidden">
                <div class="loader"></div>
                <p>Cargando datos...</p>
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- shpjs -->
    <script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>

    <!-- App Logic -->
    <script src="script.js"></script>

    <!-- Proj4js (optional, kept for advanced reprojection) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.6.2/proj4.js"></script>

    <footer
        style="position: fixed; bottom: 0; left: 0; width: 100%; background-color: white; text-align: center; padding: 10px; border-top: 1px solid #ddd; z-index: 9999;">
        The data was created using data from the Attorney General's Office
    </footer>
</body>

</html>
